services:
  sqlserver:
    build:
      context: .
      dockerfile: docker/sqlserver/Dockerfile
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$SA_PASSWORD\" -d persona_db -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  app:
    build:
      context: ./personapi-dotnet
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=persona_db;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://app:8080
    depends_on:
      - app

volumes:
  sqlserver_data:
